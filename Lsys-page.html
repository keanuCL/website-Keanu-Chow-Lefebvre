        <!-- <p class="txt">Created in 1968 by biologist Astrid Lindenmayer, L-Systems were originally designed with the intent to model the development of small (link:multicellular organisms) that we can find in fungi or algae, but it has since been used to model many other forms of life. The study of behaviour fascinates me as it often uncovers great truth about the inner workings of something. I see behavior as a reaction to the outside, it is a result of a relationship between the self and the environment. In many ways even the construction of our self is fractioned in the same way, a result of the web of relationships of different entities that inhabit our body. Observing the complex web of action and reaction of everything is a testament to the interconnectedness of life where everything seems to organise itself together in beautiful chaos.</p> -->

        <!--Sonification-->
        <!-- <p class="txt">I thought it would be fun to try find an alternate way to translate these formulas. So I decided to do this trough sound using the principle of additive synthesis. The idea would be to use a sort of pointer to spawn voices at different heights in the audible frequency spectrum. At the current location of F, the instruction to "spawn a voice(sine wave) here". The + or - are to move the pointer up or down the frequency range. Different characters like E or D are to create different types of voices (triangle or square waves). A range of other characters like +,-,*,%,$,... do things like shorthening or lenghtning the attack, decay or amplitude of the voice, finally the brackets work in a similar manner as they worked with drawing saving and returning to a certain location. </p> -->
